event: 青萍剑宗
event_id: qingping_jianzong
type: event
chapters: ["0872", "0950"]
participants: [陈平安, 崔东山, 裴钱, 朱敛, 郑大风, 姜尚真, 魏檗, 阮邛, 大骊朝廷, 风雪庙, 神诰宗, 风雷园]

cause: |
  落魄山经过陈平安多年经营, 已经从一座默默无闻的山头长成
  事实上的剑道+武道双轨道场. 大战收尾、陈平安回浩然之后,
  落魄山的体量、影响力、剑修数量都已超过宝瓶洲多数老牌
  剑道宗门. 大骊朝廷与文庙都同意把落魄山正式升格为"青萍剑宗"——
  一是封赏陈平安战功, 二是补宝瓶洲剑道的位置(正阳山被清后空缺).

process: |
  升格过程涉及: 文庙批文、大骊朝廷颁旨、风雪庙等老牌宗门的
  贺礼与试探、阮邛等人的祖师堂来访、外洲宗门的暗中盯梢.
  陈平安亲自定下青萍剑宗的几条核心规矩: 一不收虚名弟子,
  二不接外面送来的关系户, 三山下不开"客卿铺面"专做关系生意.
  崔东山以大师兄身份操办具体事务, 裴钱、朱敛、郑大风、
  姜尚真等山上骨干各自接位. 升格典礼期间, 几位老朋友
  (魏檗、阮邛、刘羡阳等)到场见证.

result: |
  落魄山正式升格为青萍剑宗, 成为宝瓶洲新一代剑道顶级宗门.
  陈平安做剑宗宗主, 崔东山做大师兄, 裴钱做关门弟子代表,
  其余骨干各任职位. 这是陈平安"一个人慢慢盘出一座剑宗"
  的兑现, 也是落魄山从"陈平安的山头"过渡到"一座有传承
  的宗门"的关键一步.

roles:
  陈平安:
    actions: |
      亲自定规矩, 接见各方贺客, 主持升格典礼. 拒绝大量送上门
      的关系户与外山弟子.
    stance: |
      "升格归升格. 落魄山的几条规矩不动."
    inner_thought: |
      他对升格本身没多少喜悦——这事更像是"该来的来了".
      他更在意的是规矩别因为升格被破坏.
  崔东山:
    actions: |
      作为大师兄全程操办具体事务, 接待外宾, 替陈平安挡掉
      一批不必要的麻烦.
    stance: |
      "先生只管坐着, 我跑腿."
    inner_thought: |
      他这一段是真心痛快的——他陪先生从落魄山走到青萍剑宗,
      这件事比当年山崖书院假装齐先生那一段还有成就感.
  裴钱:
    actions: |
      作为关门弟子代表迎宾, 替先生招呼晚辈.
    stance: |
      "先生说什么我做什么."
    inner_thought: |
      她从藕花福地那个"枯瘦小女孩"到青萍剑宗关门弟子代表,
      心里也有些不真实感.
  朱敛 / 郑大风 / 姜尚真:
    actions: |
      作为山上骨干各任职位, 把日常运转撑起来.
    stance: |
      "我们这帮人能聚在一座剑宗里, 难得."
    inner_thought: |
      他们对陈平安的认同感在升格那天达到一个新峰值——
      这不只是工作, 是归宿.
  阮邛:
    actions: |
      作为兵家圣人到场见证, 给青萍剑宗题几个字.
    stance: |
      "陈平安那小子, 我看着长大的."
    inner_thought: |
      他对陈平安从"齐先生托付的孩子"到"宝瓶洲新剑宗宗主"
      这一段, 心里很骄傲, 但他面上不说.
  魏檗:
    actions: |
      作为北岳山神到场, 帮青萍剑宗与大骊朝廷打通几个手续.
    stance: |
      "山下的事我帮忙, 山上的事我不插嘴."
    inner_thought: |
      他与陈平安多年交情, 看到青萍剑宗成立, 心里舒畅.
  外洲宗门 (集体):
    actions: |
      派人来观礼, 顺便打探陈平安实力底数.
    stance: |
      "新立的剑宗, 看看是真宗门还是花架子."
    inner_thought: |
      他们对陈平安的态度从"有点意思"过渡到"得认真对待".

related_events: [正阳山, 落魄山经营, 蛮荒大战]

fine_grain_hint: |
  升格典礼具体礼仪、崔东山操办的具体细节、各宗门贺礼名册、
  外洲宗门的具体试探——本地装好原文后可调出.
