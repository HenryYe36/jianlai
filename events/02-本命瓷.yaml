event: 本命瓷
event_id: benming_porcelain
type: concept
chapters: ["0017", "0085"]
participants: [陈平安, 刘羡阳, 顾粲, 宋集薪, 宁姚, 姚老头, 阮邛, 齐静春, 崔瀺, 大骊朝廷]

cause: |
  小镇龙窑烧出的官窑瓷器, 在骊珠洞天的特殊气运下, 与每个本地少年
  的命格暗合——一坯一人, 一物一命. 这种"本命瓷"不是迷信, 是洞天
  内独有的灵机产物: 烧成则人定一生气运, 烧坏则人遭反噬.
  大骊朝廷"奉诏监烧献陵祭器"百年, 一边为皇室祭祀, 一边在收割小镇
  孩子们的气运根脚. 这是骊珠洞天破碎前最大的一笔暗手.

process: |
  陈平安在龙窑做了多年学徒, 拉坯、练泥、烧窑——这些活实际上
  是在"养"自己的本命瓷. 大骊朝廷挑出几个根骨好的孩子, 借由窑工
  之手把孩子们的气运炼入瓷器中, 然后送入皇陵, 一并祭祀供养.
  刘羡阳、顾粲、宋集薪等小镇核心孩子, 各有一件已烧成或将烧成的本命瓷.
  齐静春发现大骊这一手后, 跟杨老头打过招呼, 后来与崔瀺有过交涉:
  陈平安、刘羡阳、顾粲三人的本命瓷由齐静春和阮邛分别保住,
  其余孩子的瓷器则按大骊的盘子走. 阮邛后来在陈平安离镇前, 把他的
  本命瓷送回陈平安手上.

result: |
  陈平安的本命瓷被保下, 成为他一生气运的"基本盘"——他笨拙、能扛、
  不赖账的根性, 跟这瓷器有关. 刘羡阳的本命瓷由阮邛收下, 后来成为
  他成为剑宗弟子的根器. 顾粲的本命瓷被那位托碗老人(玉圭宗)
  介入收走, 顾粲自己被收做嫡传弟子. 大骊朝廷在洞天破碎后失去
  这条暗道, 但留下的几件成品瓷器, 仍是大骊国运的一部分.

roles:
  陈平安:
    actions: |
      多年在龙窑做练泥的体力活、被姚老头嫌弃天分差.
      不知不觉在自己拉坯练手的过程里, 把一身气运磨进了一件件瓷器.
    stance: |
      他不知本命瓷是什么. 他只是想多赚一口饭吃.
    inner_thought: |
      他被姚老头嫌弃"资质差"的那几年, 反而是最稳的几年——
      没有哪件瓷器在他手上烧坏, 也就没有哪段气运在他身上反噬.
  刘羡阳:
    actions: |
      天分比陈平安好, 在龙窑里做正经拉坯活儿, 烧出过几件
      被姚老头收走的成品瓷.
    stance: |
      他不知本命瓷的事, 但他对烧瓷这件事一直认真.
    inner_thought: |
      多年后回头看, 他知道自己当年那种"莫名其妙的好运",
      其实是阮邛在替他把瓷器扣下了.
  顾粲:
    actions: |
      天分高, 烧坯顺利, 但本人贪玩, 一件本命瓷险些被外人拿走.
    stance: |
      他什么都不懂, 只是个孩子.
    inner_thought: |
      被托碗老人收徒后, 心里其实是不愿意的——他要的不是仙缘,
      是陈平安身边的玩伴位置.
  齐静春:
    actions: |
      跟杨老头打招呼, 跟崔瀺谈分配, 暗中保下陈平安、刘羡阳、顾粲三件.
    stance: |
      "孩子的命不是给皇室祭祀用的. 这条线我必须截下来."
    inner_thought: |
      他知道全截截不下来, 截一两件已经是极限. 但只要核心几件保住,
      整个洞天破碎后的局还能下.
  崔瀺:
    actions: |
      跟齐静春谈判, 同意保住陈平安、刘羡阳、顾粲, 其余维持大骊原议.
    stance: |
      "大骊要这条暗线, 但我不跟师弟争核心几个."
    inner_thought: |
      他清楚陈平安那件瓷器的分量比所有别的合起来还重, 但他不去抢——
      抢了, 师弟会跟他翻脸; 不抢, 这一颗将来还是落到他这盘棋的最末端.
  阮邛:
    actions: |
      作为铁匠铺主人, 表面打铁, 实际承接齐静春关于几件瓷器的托管.
      陈平安离镇前, 把陈平安的本命瓷送回他手里.
    stance: |
      "齐先生托我的, 我必须做到."
    inner_thought: |
      他对小镇里这些孩子是真喜欢的——这种喜欢里, 一半是兵家圣人的
      看好, 一半是阮秀对陈平安的态度让他没法装看不见.

related_events: [小镇押注, 骊珠洞天坠落事件, 求学远游]

fine_grain_hint: |
  姚老头与陈平安之间具体的拉坯教学、托碗老人收顾粲的具体过程、
  阮邛把瓷器交还陈平安的那一段——本地装好原文后可调出.
