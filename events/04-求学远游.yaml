event: 求学远游
event_id: shanya_journey
type: arc
chapters: ["0084", "0200"]
participants: [陈平安, 李宝瓶, 林守一, 李槐, 于禄, 谢谢, 石春嘉, 董水井, 阿良, 朱河, 朱鹿, 马瞻, 崔明皇, 阮邛]

cause: |
  齐静春身死, 山崖书院本由齐先生主持, 已迁去敌国大隋.
  山崖书院的几名学塾蒙童——李宝瓶、李槐、林守一、于禄、谢谢、
  石春嘉、董水井——失去先生后, 部分孩子愿意继续去山崖书院读书.
  陈平安在阮邛见证下答应把孩子们送到山崖书院, 同时自己也以
  这趟远行作为离开小镇、走向更大天地的起点.

process: |
  阮邛保陈平安和李宝瓶到大骊南端边境, 出境之后由陈平安独自带李宝瓶
  穿越大骊到大隋. 学塾老先生马瞻被观湖小君崔明皇害死, 临终用三张
  祖荫槐叶续命, 把"找陈平安"的指令交给李宝瓶. 五个孩子用计谋
  甩掉车夫(大骊死士), 跑到铁匠铺找陈平安. 陈平安带四个孩子上路,
  阿良中途加入做"剑客向导", 以及朱河朱鹿父女随行护送.
  一路过红烛镇、铁符河、冲澹江, 一行人在数次小镇风波、
  神鬼之乱、修士袭击中逐步推进. 陈平安在这一路上从一个
  "刚出小镇的少年"被磨成"能护住几个孩子的人". 阿良在山崖书院
  即将到达前留下斗笠告别. 陈平安最终把四个孩子送进山崖书院,
  自己继续南下落魄山+老龙城方向.

result: |
  四个孩子顺利入山崖书院读书, 此后各自成才(李宝瓶成读书人,
  林守一成炼气士, 李槐成画师, 于禄成剑修). 陈平安完成对齐静春的
  承诺, 同时这一段路成为他后来所有"带人""担承诺"经验的起点.
  阿良的指点让陈平安第一次见识山外山的境界.
  整段游学是陈平安从"自己活下去"过渡到"帮别人也站起来"的关键.

roles:
  陈平安:
    actions: |
      负重山行、一路赚路费、应对妖怪与修士、在每一次风波中
      把孩子们护下来. 学走桩、练拳、练习应对各种修士手段.
    stance: |
      "答应了, 就送到底."
    inner_thought: |
      他知道这一路自己有可能死. 他没把这事跟孩子们提.
      这种"自己默默把代价吃下"的方式, 这一段路上正式定型.
  李宝瓶:
    actions: |
      作为孩子里最聪明也最能扛事的那个, 多次替陈平安补漏.
      在马先生死后那一段, 是她带头组织五个孩子的应对.
    stance: |
      "我要去山崖书院读书. 这件事不能改."
    inner_thought: |
      她崇拜陈平安, 但她最大的力量来自自己——
      她知道齐先生在天上看着, 她不能哭着回小镇.
  阿良:
    actions: |
      路上突然加入, 教剑、解妖、调侃、买酒、留斗笠.
    stance: |
      "陪一段, 该走就走. 不收徒, 不立门派."
    inner_thought: |
      他喜欢陈平安那种笨拙却真诚的劲儿, 但他不会替陈平安多走一步.
      他懂"陪伴"和"代行"的区别.
  朱河:
    actions: |
      作为李家护卫, 一路保护李宝瓶, 出借震妖铃给陈平安观摩.
    stance: |
      "我护小姐, 但陈平安这种少年, 我也当朋友处."
    inner_thought: |
      他对陈平安从将信将疑到真心敬重, 这一路是慢慢转变的过程.
  崔明皇 (反派, 已死):
    actions: |
      路上假扮观湖君子, 害死马瞻, 试图绑架五个孩子.
    stance: |
      "孩子们的气运对我观湖书院有用."
    inner_thought: |
      他是这一路第一个让陈平安他们意识到"外面世界没那么纯净"的人.
  马瞻:
    actions: |
      被崔明皇害死前, 用三张祖荫槐叶续命, 把"找陈平安"的话交给李宝瓶.
    stance: |
      "孩子们的安全要紧, 我这条命该用就用."
    inner_thought: |
      他至死不知陈平安身份的具体重量, 但他知道齐静春信他.
  阮邛:
    actions: |
      送陈平安和李宝瓶到大骊南境, 出境之后撒手.
      作为兵家圣人, 他这一段对陈平安的护持已经是最大限度.
    stance: |
      "答应过齐先生, 也答应过陈平安."
    inner_thought: |
      他不愿陈平安死, 但他也尊重"出境之后, 生死自负"的规矩.

related_events: [大考落幕, 大骊刺杀陈平安]

fine_grain_hint: |
  阿良教陈平安走桩与剑炉立桩、震妖铃与朱河的具体细节、林守一第一次
  炼气、李槐家世背景、过敷水湾、过红烛镇枕头驿——本地装好原文后可调出.
