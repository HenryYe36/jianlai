event: 剑气长城
event_id: jianqi_changcheng
type: place
chapters: ["0566", "0700"]
participants: [陈平安, 宁姚, 陈清都, 阿良, 左右, 隐官各代, 飞升境剑修群体, 文海周密, 蛮荒大祖, 托月山剑修群体]

cause: |
  剑气长城是浩然天下与蛮荒天下之间唯一的屏障——一座由历代剑修
  以剑意、剑心、性命堆砌而成的"城". 它不是普通城墙, 是阻止蛮荒
  跨界入侵浩然的关键节点. 城里所有剑修都在轮换守城,
  最高负责人是城主陈清都, 城下设隐官一职作为"代城主行使具体事务"的人.
  陈平安从小镇走到剑气长城, 经倒悬山入城, 是因为宁姚是这座城的"城主之女",
  也是因为陈平安自身的剑修资质与齐静春、阿良一线的安排.

process: |
  陈平安到剑气长城后做隐官一段时间, 替宁姚顶住代位.
  期间历经多次战事——蛮荒来犯、托月山围杀、飞升城争夺、
  与陈清都的反复对话. 陈平安亲眼见到剑修一代代死在城头,
  也亲手送走过几位老剑修. 在剑气长城他第一次完整理解
  "守"这个字的全部分量——它不是一时一地的守, 是几千年
  一代代人接力的守. 期间陈清都给他讲过无数次"我们这些人
  是怎么死过来的". 陈平安在剑气长城的修为也在战火中
  突飞猛进, 从五境武夫一路走到能跟蛮荒大妖周旋. 阿良
  此前已在城里出过那一次"力挽狂澜"的剑(参见: 剑气长城守卫战),
  这是这座城所有剑修共同的精神底色.

result: |
  剑气长城在大战后期最终破碎(此为后续蛮荒大战重要节点之一),
  但破之前的那段陈平安在城里的日子, 是他这一生最重要的"修剑+修心"段.
  他从隐官位置上学到: 剑不只是武器, 是一种"我在你身后撑着"的承诺.
  剑气长城的精神被陈平安带回浩然——后来落魄山的整套行事方式,
  本质上是缩小版的剑气长城.

roles:
  陈平安:
    actions: |
      做隐官、替宁姚出剑、与剑修们同饮、把每一次城头死人都记在心里.
    stance: |
      "宁姚不在的时候, 这把椅子不能空."
    inner_thought: |
      他第一次理解"代行"两个字的重量——不是"我比她强",
      是"她不在的时候, 我得让别人觉得她还在".
  宁姚:
    actions: |
      把隐官位置交给陈平安, 自己出去走几条独立的路.
    stance: |
      "我相信你能坐住."
    inner_thought: |
      她比陈平安自己更早看见陈平安将来的样子.
      她交位置不是怀疑他, 是要他自己长大.
  陈清都:
    actions: |
      作为城主带陈平安入城、传授、压制、考验.
      多次在关键节点替陈平安挡杀招.
    stance: |
      "剑气长城是规矩之外的规矩."
    inner_thought: |
      他比陈平安自己更早看到陈平安"成为飞升城新主人"的可能性.
      他没说, 是要陈平安自己走到那一步.
  阿良:
    actions: |
      不常出现, 但偶尔回来, 陪剑修们喝酒, 跟陈平安说几句要紧话.
    stance: |
      "我留在这里, 是给城里其他人撑一口气."
    inner_thought: |
      他对剑气长城感情极深——这是他的"老家".
  左右:
    actions: |
      作为同门, 偶有碰面. 不多说话, 但出现时陈平安心定.
    stance: |
      "剑修做剑修该做的事."
    inner_thought: |
      他对陈平安做隐官没意见, 也没夸赞——他这种人不评价同道.
  飞升境剑修群体 (集体):
    actions: |
      轮班守城、出城迎战、城头喝酒、把剑插进尸堆带回来.
    stance: |
      "这一代人没守住, 下一代人接着守."
    inner_thought: |
      他们不是不怕死, 只是认了死是这件事的一部分.

related_events: [剑气长城守卫战, 蛮荒大战, 求学远游]

fine_grain_hint: |
  陈清都跟陈平安在城头的具体对话、陈平安做隐官期间断的几起案、
  剑修们之间的几位重要朋友(刘十六、董画符、齐景龙等)、
  陈平安第一次摸到老剑条的细节——本地装好原文后可调出.
