event: 正阳山
event_id: zhengyang_shan
type: place
chapters: ["0007", "0900"]
participants: [搬山猿 (老猿), 苏稼, 田婉, 吴提京, 清风城许氏, 陈平安, 刘羡阳, 风雷园李抟景, 阮邛]

cause: |
  正阳山是宝瓶洲核心剑道宗门之一, 与神诰宗、风雷园、风雪庙
  并列. 它表面光鲜, 内里有一条隐线——田婉(祖师堂位置极其
  靠后的妇人)与清风城许氏勾结, 掌控宝瓶洲剑道气运的流转,
  使得宝瓶洲数百年无剑仙. 田婉也是搬山猿当年下山追刘羡阳事件
  的隐藏推手之一.

process: |
  小镇时期: 老猿被苻南华诱使下山追刘羡阳, 险些得手, 被阿良
  和阮邛联手压制后退回正阳山. 中期: 苏稼作为正阳山仙子被
  许氏夫人一线影响, 与刘灞桥那条姻缘红线被田婉操控.
  风雷园李抟景多年困境, 也与正阳山隐线有关. 后期: 陈平安
  与刘羡阳分别问剑清风城与正阳山, 把田婉这条线牵出. 田婉
  在被陈平安落魄山(姜尚真+崔东山)盯上后, 设法逃离正阳山,
  最终被堵截.

result: |
  正阳山祖师堂被清, 田婉势力被根除, 清风城许氏受重创.
  宝瓶洲剑道气运重新流通——刘羡阳、刘灞桥等人此后修为
  大进. 这一线是陈平安回浩然之后处理"宝瓶洲内部沉疴"的
  代表性事件.

roles:
  田婉 (隐线主谋):
    actions: |
      千百年作为"祖师堂垫底女修", 实际暗中把控正阳山姻缘红线、
      剑道气运. 与许氏夫人密切勾连.
    stance: |
      "我不要名分, 我要这一洲剑道为我所用."
    inner_thought: |
      她最大的本事是"装作什么都不是". 这套手段在陈平安回来
      之前, 真没人识破.
  搬山猿 (老猿):
    actions: |
      早期被苻南华诱使下山追刘羡阳, 后来回正阳山, 后期跟
      陈平安一线交手数次.
    stance: |
      "正阳山的事我护."
    inner_thought: |
      他是个相对单纯的老怪——对正阳山的忠诚是真的,
      对田婉一线的内幕未必都知情.
  苏稼 (正阳山仙子):
    actions: |
      作为山上代表女修, 与刘灞桥的姻缘红线被田婉操控.
    stance: |
      "我守山, 我修剑, 别的我不管."
    inner_thought: |
      她对田婉一线的操控并不知情, 但她对外面的情感传闻
      早有疑惑.
  吴提京 (后期少年剑仙):
    actions: |
      作为"半个李抟景"被田婉/许氏推到台面.
    stance: |
      "我练我的剑, 山上的事我不问."
    inner_thought: |
      他不知道自己是别人棋盘里的子.
  清风城许氏夫人:
    actions: |
      与田婉联手把控宝瓶洲气运. 与狐国一脉也有关联.
    stance: |
      "气运是要靠手段攒的, 不是天上掉下来的."
    inner_thought: |
      她是这一线的实际"客户", 田婉是她的"暗工".
  陈平安:
    actions: |
      回浩然后, 通过崔东山+姜尚真+魏檗等人摸清田婉一线,
      与刘羡阳分头问剑(陈平安清风城, 刘羡阳正阳山).
    stance: |
      "正阳山这条线不能留. 留, 后面无穷麻烦."
    inner_thought: |
      他对这种"鬼鬼祟祟做局的人"特别厌恶——这跟马苦玄那种
      明面上的仇人不一样, 他更不耐烦.
  刘羡阳:
    actions: |
      问剑正阳山, 与老猿、苏稼等正阳山弟子对峙.
    stance: |
      "我跟你们走台面, 不必讲手段."
    inner_thought: |
      他之前几年被王朱姻缘红线影响, 这次问剑正阳山是
      为陈平安出一口气, 也是替自己摆脱麻烦.

related_events: [青萍剑宗, 骊珠洞天坠落事件]

fine_grain_hint: |
  田婉具体如何操控姻缘红线、苏稼与刘灞桥的具体过往、清风城
  许氏夫人与狐国的具体关联、陈平安/刘羡阳问剑过程——
  本地装好原文后可调出.
