event: 夜航船
event_id: yehang_chuan
type: place
chapters: ["0612", "0820"]
participants: [陈平安, 陆沉, 顾清崧 (仙槎), 文海周密, 崔瀺, 浩然贾生, 各类历史贵客]

cause: |
  夜航船是浩然天下与外天下之间往来的一艘"传奇渡船"——
  船体由仙槎所化, 撑船人是顾清崧(仙槎本体). 几千年来船上
  搭载过无数高人, 包括各代道祖弟子、儒家圣贤、蛮荒之人.
  夜航船不接普通乘客, 它是一种"机缘"——上船的人都自带故事.
  这艘船在剑来的世界观里是"渡口之外的渡口", 跨界、跨时、跨
  阵营.

process: |
  陈平安多次接触夜航船. 第一次是远观, 知道这艘船的存在;
  后来与陆沉、顾清崧打交道时, 几次登船. 在船上他遇到
  传说中的"贵客"——有几位是已故圣贤的"残念", 有几位是
  蛮荒一脉走过路过的人物, 有几位是历代飞升者. 文海周密
  当年还是浩然贾生时, 也曾被邀登过夜航船——这一段
  对周密后来的转变是关键节点之一. 崔瀺也曾上过, 在去往
  中土神洲的路上.

result: |
  陈平安通过夜航船完成了几次重要的跨地点位移与跨人物会面,
  他对"道理可以隔时空传递"这件事的理解, 部分来自这艘船.
  夜航船本身是这本书里"非战斗性大格局背景"的代表元素之一,
  代表"这世道有比战斗更长的事"——一种安静但巨大的存在.

roles:
  陈平安:
    actions: |
      多次登船, 与陆沉、顾清崧对话; 通过夜航船完成几次跨界
      联络.
    stance: |
      "上船不喧哗, 听船上人讲他们的事."
    inner_thought: |
      他在夜航船上学到的最重要一件事: 不是所有道理都要靠
      打杀去验. 有些道理是几千年船上几句闲话就够.
  陆沉:
    actions: |
      作为青冥天下三掌教, 与夜航船渊源极深. 早年是顾清崧
      帮他撑船的乘客之一.
    stance: |
      "船是船, 道是道. 我闲来上船看戏."
    inner_thought: |
      他对夜航船的态度是"老朋友"——这是他少数会真心
      留几分余地的关系.
  顾清崧 (仙槎):
    actions: |
      撑船. 不评说, 不站队, 不强求乘客.
    stance: |
      "上船的人, 是船自己挑的, 不是我挑的."
    inner_thought: |
      他活得极久, 见过太多人, 但从不失温度.
      他对每位乘客都给同样的茶水.
  文海周密 (年轻时贾生):
    actions: |
      早年作为浩然贾生在去往倒悬山途中被邀登船.
    stance: |
      "我登船, 是要看看船上人到底懂不懂我."
    inner_thought: |
      这一段经历让他后来转向蛮荒的过程加快了. 船上某句话
      让他下定决心.
  崔瀺:
    actions: |
      早年作为文圣首徒在去往中土神洲的路上登过夜航船.
    stance: |
      "看船, 看人, 看局."
    inner_thought: |
      他在夜航船上不卖弄, 也不耍机锋, 只是听. 这一段让他
      后来对"代价"两字有了更深认识.

related_events: [天地通, 蛮荒大战]

fine_grain_hint: |
  夜航船的具体航线、几位"贵客"的身份、陆沉与顾清崧的旧约、
  陈平安在船上几次重要对话——本地装好原文后可调出.
