event: 杀姜赦
event_id: kill_jiang_she
type: event
chapters: ["1119", "1141"]
participants: [陈平安, 姜赦, 崔东山, 吴霜降, 落魄山众, 大骊朝廷]

cause: |
  姜赦是后期出现的强敌之一, 来自浩然某老牌势力, 实力极高.
  他多次试探落魄山+青萍剑宗一线, 行事手段狠辣, 屡屡逼近
  陈平安身边人的底线. 若不处理, 姜赦后期会成为青萍剑宗
  与浩然内部秩序的长期威胁. 陈平安此前一直避免与姜赦正面
  开战, 选择以演武等方式压制——但事态最终走到不杀不行的地步.

process: |
  陈平安与姜赦的对决经过多次铺垫: 早先在演武场上,
  陈平安以拳罡+剑气+武运三轨交织压制姜赦; 后续吴霜降下场,
  局面再变, 百余件法宝在陈平安拳意下"跟不要钱似的崩碎";
  最终一战, 陈平安拿出全部底牌——含飞剑、武道气数、与同盟
  借来的几枚关键法宝, 在数次拉锯之后, 把姜赦这条命彻底了结.
  崔东山在战后处理后续: 善后、清账、接应大骊朝廷的态度.

result: |
  姜赦死. 浩然内部一批跟姜赦有关联的暗线被一并清理.
  陈平安的"不出剑则已, 出剑必到位"的口碑进一步成型.
  这一战也是陈平安进入"超一流"行列后第一次完整意义上的"杀人立威".
  落魄山+青萍剑宗+飞升城三位一体的格局更稳, 后期再无人轻易
  挑衅这一线.

roles:
  陈平安:
    actions: |
      与姜赦多场演武+正式对决. 最终一战拿出全部底牌, 杀姜赦.
    stance: |
      "姜赦这一刀, 不是我想下, 是不下不行."
    inner_thought: |
      他这一战之前犹豫了很久——他不愿把"杀人"这件事做得
      像家常便饭. 但他想清楚了: 留姜赦, 后面无穷麻烦.
      他把账算清楚了才下手.
  姜赦:
    actions: |
      多次挑衅陈平安一线, 在演武场上屡败屡战, 最终在正式对决中身死.
    stance: |
      "陈平安名声大, 我要试一下."
    inner_thought: |
      他到死前才意识到, 陈平安不是他这种"试一下就走"的对手——
      陈平安一旦认真, 就是终结一条命的认真.
  崔东山:
    actions: |
      战后处理: 善后、清账、与大骊朝廷沟通、安抚落魄山众.
    stance: |
      "先生杀人, 山上的事我兜."
    inner_thought: |
      他对先生这次出手的判断是"该".
  吴霜降:
    actions: |
      战中后期下场, 让局面变化. 与陈平安交手, 验证陈平安实力.
    stance: |
      "我看看陈平安到底能到哪一步."
    inner_thought: |
      他是观察者+测试者, 不是真敌——但他下场让陈平安不得不
      亮出全部底牌.
  落魄山众 (集体):
    actions: |
      保持克制, 不擅自介入, 等先生回来.
    stance: |
      "先生的事先生做."
    inner_thought: |
      他们对这一战的紧张程度远超表面.
  大骊朝廷:
    actions: |
      在姜赦死后默许, 不追问, 不公开评价.
    stance: |
      "陈平安做的事, 大骊不干涉."
    inner_thought: |
      朝廷对青萍剑宗+陈平安一线的态度已经从"扶持"过渡到
      "不打扰"——这是默认对方有相当于"半个朝廷"的地位.

related_events: [青萍剑宗, 蛮荒大战, 剑气长城]

fine_grain_hint: |
  陈平安与姜赦演武具体回合、吴霜降下场后的局势变化、
  最终一战陈平安亮出的全部底牌细节——本地装好原文后可调出.
