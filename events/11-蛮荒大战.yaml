event: 蛮荒大战
event_id: manhuang_war
type: event
chapters: ["0700", "0810"]
participants: [文海周密, 托月山大祖, 蛮荒至高, 陈平安, 崔瀺, 齐静春, 老秀才, 阿良, 礼圣, 亚圣, 陆沉, 杨老头, 道祖, 佛祖, 陈清都, 宁姚, 桐叶洲难民, 大骊]

cause: |
  蛮荒天下文海周密谋划千年, 决定从剑气长城突破, 攻入浩然天下.
  目的有三: 占据浩然山河气运、覆盖三教祖师面、自身借飞升台开天
  跻身旧天庭神位. 浩然方面: 文庙、儒释道三教、各洲朝廷与宗门、
  剑气长城所有剑修, 形成不情愿但事实上的统一战线.
  齐静春已死多年, 此时以"门神"姿态准备入局; 崔瀺以大骊国师
  身份长期布局, 陈平安以"飞升城新主人"身份在长城/飞升城一线;
  老秀才作为文圣替几代人撑伞.

process: |
  战事按几条主线推进:
  1) 剑气长城战线: 蛮荒派托月山主力攻城, 长城阿良力挽狂澜后
     仍部分破开, 陈平安在隐官位置上死扛, 顶替宁姚出剑;
  2) 桐叶洲战线: 蛮荒大祖与浩然几位至圣对碰, 桐叶洲首先沦陷,
     然后被慢慢收复——崔瀺、齐静春、顾璨、文海周密在桐叶洲
     交锋, 周密在此线上吃了大亏;
  3) 宝瓶洲战线: 崔瀺早年布的"老龙城-南端铜墙铁壁"防御线
     吃住了蛮荒分兵, 没让蛮荒在这里突破;
  4) 飞升台一线: 周密备好"如果输了就开天而去"的退路, 齐静春
     原本要做门神堵住, 后改为与崔瀺合力主动算计周密;
  5) 文庙线: 礼圣、亚圣等几位圣人对接道祖佛祖, 协调各洲资源.
  最终阶段: 托月山大祖以本命合道, 拼搬移天庭旧址撞入浩然失败,
  文海周密一度逃入飞升台, 被齐静春+崔瀺+陈平安联手堵死后路.

result: |
  蛮荒败退. 浩然方损失惨重——剑气长城重创, 桐叶洲数洲山水
  神祇消亡, 大量剑修阵亡. 但浩然主体保住, 蛮荒重要力量被消耗,
  几十年内无力再战. 文海周密虽未死, 但他登天的盘算被堵死,
  齐静春以"完成最后一手"的姿态落幕. 崔瀺在战后退场, 老秀才
  恢复文圣位. 陈平安成为飞升城真正的城主, 同时回归浩然落魄山.
  这场大战是整本剑来的最大轴心事件, 后续所有人物的轨迹都从
  这里收束.

roles:
  陈平安:
    actions: |
      隐官+飞升城新主人位置. 顶替宁姚出剑. 桐叶洲斗周密时出力.
    stance: |
      "他们两位算盘打得再精, 也得有一个人在前头一拳一拳挨下来."
    inner_thought: |
      他这一段彻底从"被布的子"变成"自己也在布子的人".
      但他没让自己骄傲——他每天还是该干嘛干嘛.
  崔瀺:
    actions: |
      宝瓶洲南端铜墙铁壁; 桐叶洲与周密斗法; 飞升台一线堵后路;
      战后退场.
    stance: |
      "天下太平了吗? 是的. 可以高枕无忧了吗? 我看未必."
    inner_thought: |
      他这盘棋下了几十年, 收尾时反而冷淡——他不需要谁为他鼓掌.
  齐静春 (死后出场):
    actions: |
      大渎祠庙现身. 与崔瀺合力算计周密. 桐叶洲斗法.
    stance: |
      "原本要做门神. 后来选择相信师兄."
    inner_thought: |
      死后这一段他做的事比生前还重要. 这是他"过河卒不回头"
      的彻底兑现.
  老秀才:
    actions: |
      作为文圣替几代人撑伞. 与道祖佛祖对话, 协调三教.
    stance: |
      "护短到不讲道理."
    inner_thought: |
      他这一战护的是他三个弟子和陈平安——他从不藏这一点.
  阿良:
    actions: |
      力挽狂澜剑气长城那一剑. 战后留在长城遗址.
    stance: |
      "我留这里, 不是隐居, 是接着看天."
    inner_thought: |
      他比谁都老. 看过太多场这种事. 这一场对他来说是又一场.
  文海周密 (蛮荒首脑):
    actions: |
      千年布局; 大战指挥; 飞升台逃路被堵后, 仍未死, 退入暗处.
    stance: |
      "蛮荒赢, 我赢; 蛮荒输, 我借飞升台开天."
    inner_thought: |
      他没料到齐静春+崔瀺会联手堵他后路——这是他这局唯一
      算漏的一颗子.
  托月山大祖:
    actions: |
      亲临前线指挥; 最后阶段以本命合道拼搬移天庭旧址撞浩然.
    stance: |
      "蛮荒打浩然, 不是为了赢, 是要让浩然付出代价."
    inner_thought: |
      他知道周密有飞升台后手, 自己这一线是真打.
  礼圣 / 亚圣:
    actions: |
      文庙调度, 协调三教各洲资源, 必要时亲自出手.
    stance: |
      "三教祖师面的事, 我们扛."
    inner_thought: |
      他们对崔瀺、齐静春、陈平安这一脉的态度是默许 + 暗中支持.

related_events: [剑气长城守卫战, 文庙议事, 五彩天下]

fine_grain_hint: |
  各战线具体战役顺序、桐叶洲斗周密细节、托月山大祖搬移天庭旧址
  的过程、几位至高交锋瞬间——本地装好原文后可调出.
