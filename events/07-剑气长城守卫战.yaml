event: 剑气长城守卫战
event_id: changcheng_battle
type: event
chapters: ["0640", "0710"]
participants: [陈平安, 宁姚, 陈清都, 阿良, 左右, 文海周密, 托月山大祖, 流白, 离真, 雨四, 㴫滩, 竹箧, 阴阳家陆氏, 礼圣]

cause: |
  蛮荒天下经过长期布局, 决定大举攻打剑气长城——这是浩然天下与
  蛮荒之间的最后屏障. 阴阳家陆氏耗尽修为推衍, 文庙得出"剑气长城
  必破"的结论, 整个浩然天下开始为长城破后的难民迁徙做准备.
  蛮荒一方由文海周密总盘统筹, 托月山大祖为军事首领, 派"甲申帐"
  五位剑修(流白、离真、雨四、㴫滩、竹箧)与百余托月山剑仙
  执行围杀行动.

process: |
  战事分多波次. 阿良在关键时刻出剑, 力挽狂澜, 一度让推衍中"必破"
  的结果延后. 陈清都坐镇城主之位, 陈平安在隐官位置上代宁姚出剑.
  甲申帐五剑围杀陈平安, 陈平安拧断流白脖子——这是浩然方少有的
  "顶替宁姚出剑也能赢"的硬战例. 城头死人不计其数, 一代代剑修
  以命换时间. 蛮荒方文海周密多次试探城防, 寻找飞升台节点.
  最终城防虽未完全崩, 但"剑气长城必破"的命数还是落实——
  长城破开一段缺口, 通往蛮荒的通道被打开, 大量浩然剑修阵亡,
  蛮荒势力顺势进入浩然.

result: |
  剑气长城受重创, 大量剑修阵亡, 但浩然天下因长城拖延的几年时间,
  得以完成桐叶洲难民迁徙、其他几洲的防御部署. 阿良成为长城精神
  的代表性人物之一. 陈平安在战后转入飞升城做新主人, 老剑条认主.
  这一战为后续"蛮荒大战"主战场转移到桐叶洲及浩然腹地铺路.

roles:
  陈平安:
    actions: |
      在隐官位置上指挥+出战; 拧断流白脖子, 击溃甲申帐围杀; 多次以
      隐官名义压住城内剑修内部分歧.
    stance: |
      "宁姚不在, 我就是那把椅子."
    inner_thought: |
      这是他第一次真正"以一个人扛一座城"的体验. 后来他对所有担承诺
      的事都极上心, 根子在这里.
  宁姚:
    actions: |
      不在长城战场, 在外线另一条路上独立作战. 偶有飞剑联络.
    stance: |
      "我相信他坐得住, 我也相信我能在外面做完我的事."
    inner_thought: |
      她其实最揪心——她跟谁都没说.
  陈清都:
    actions: |
      坐镇城主位, 多次以本命修为补陈平安、补阿良. 战后把飞升城主
      位置正式交给陈平安, 称"老剑条选了你".
    stance: |
      "我这把老剑插进城里几千年, 现在该让新人接."
    inner_thought: |
      他比陈平安自己更早接受"长城终归要破"的事实, 但他不让陈平安
      过早接受——年轻人需要这一段心气.
  阿良:
    actions: |
      力挽狂澜的那一剑. 战后退守长城遗址.
    stance: |
      "推衍归推衍, 出剑归出剑."
    inner_thought: |
      他这一剑把浩然整盘的命运延后了好几年. 他没居功——他只是觉得
      "那时候不出, 这辈子都没机会出".
  文海周密:
    actions: |
      远程总盘调度蛮荒战力. 多次试探长城防御与飞升台节点.
    stance: |
      "长城必破. 唯一变数是破得快慢."
    inner_thought: |
      他对阿良那一剑既敬又恨. 这是他这局唯一没有提前算到的变数.
  托月山大祖:
    actions: |
      亲临前线指挥蛮荒攻势, 与浩然几位至高存在交锋.
    stance: |
      "蛮荒打浩然, 不是为了赢. 是为了让浩然付出代价."
    inner_thought: |
      他知道周密有飞升台后手, 自己这一手是周密的主战面.
  甲申帐五剑修 (流白等):
    actions: |
      围杀陈平安, 五对一. 流白被陈平安拧断脖子, 其余四人各有伤亡.
    stance: |
      "杀陈平安, 替托月山立威."
    inner_thought: |
      他们没把陈平安当回事, 死前才意识到这少年身后是几千年的剑气长城.
  阴阳家陆氏:
    actions: |
      推衍长城命数, 耗尽自身修为得出结论, 报予文庙.
    stance: |
      "推衍之事, 准与不准都得说."
    inner_thought: |
      她对自己这次推衍的"必破"结果不甘心, 但她比谁都清楚——
      推衍出的事, 改不了.

related_events: [剑气长城, 蛮荒大战, 文庙议事]

fine_grain_hint: |
  阿良力挽狂澜那一剑的具体形态、陈平安拧断流白时心理与节奏、
  陈清都给陈平安传授的飞升城主位的具体过程——本地装好原文后可调出.
