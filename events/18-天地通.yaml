event: 天地通
event_id: tiandi_tong
type: concept
chapters: ["0612", "1100"]
participants: [陈平安, 道祖, 佛祖, 至圣先师, 礼圣, 老秀才, 文海周密, 陆沉, 各天下至高]

cause: |
  "天地通"是剑来世界观里最大的元概念之一——指的是几座天下
  之间的"道路"开合状态. 天地通则各天下之间可以通行(夜航船、
  飞升台、跨界渡船等等), 天地不通则各自封闭. 千百年来,
  各家至高对"天地通"的态度不一: 有人主张通(交流促融合),
  有人主张闭(自守保气运), 有人主张选择性通. 蛮荒大战之后,
  浩然+蛮荒+青冥+西方+五彩天下之间的"通"与"不通"成为新的
  议题——尤其是飞升台、夜航船、新立的几条跨界路.

process: |
  天地通的议题贯穿后期数次圣人议事. 道祖主张相对开放(让道家
  各天下自由交流), 佛祖主张选择性通(以教化为前提), 至圣先师
  主张审慎(规矩先于通), 礼圣主张先把规矩定死再开. 老秀才
  在恢复文圣位之后, 倾向于"通——但通过教化, 不是通过武力".
  陈平安此时已是"飞升城主+青萍剑宗主+老秀才/亚圣关门弟子"
  多重身份, 在天地通议题上是少数能跨多线说话的中坚. 他的
  立场偏向: "通可以, 但每条道上得有人坐镇, 不能自由出入."
  这一立场被三教接受, 成为大战后跨天下秩序的事实基础.

result: |
  天地通秩序成型: 飞升台由杨老头(青童天君)继续守, 夜航船
  由顾清崧继续撑, 新立几条跨界道由各家分别派镇守人.
  五彩天下作为"试验地"接收若干旧秩序里安置不下的群体.
  这一秩序不是大胜利, 也不是僵硬封闭, 是各方妥协的产物.
  陈平安在这件事上扮演"协调员"角色, 这是他作为"新一代核心"
  正式进入跨天下话语权的标志.

roles:
  陈平安:
    actions: |
      在多次圣人议事中代表"年轻一代核心"发言, 协调各家立场.
      自己亲自坐镇若干条跨界路.
    stance: |
      "通可以, 但每条道上得有人."
    inner_thought: |
      他不爱去文庙开会, 但天地通这件事他必须到场——他知道
      自己一旦缺席, 这件事就可能被搞砸.
  道祖:
    actions: |
      作为道家至高, 主张相对开放.
    stance: |
      "道是无碍的. 通是道的本意."
    inner_thought: |
      他对天地通的态度受陆沉、顾清崧等人影响.
  佛祖:
    actions: |
      作为佛家至高, 主张选择性通.
    stance: |
      "通要以教化为前提, 不能让人在通里堕落."
    inner_thought: |
      他比道祖谨慎, 但比至圣先师开明.
  至圣先师 (儒家):
    actions: |
      作为儒家至高, 主张审慎.
    stance: |
      "规矩先于通."
    inner_thought: |
      他对老秀才那一脉学问的影响, 在这件事上最深——
      老秀才"通——但通过教化"的折中, 他默认了.
  礼圣:
    actions: |
      主持议事, 把"通"的具体规矩定下来.
    stance: |
      "我管规矩, 不管哲学."
    inner_thought: |
      他对老秀才的方案做了大量补丁, 让它能跑得起来.
  老秀才:
    actions: |
      恢复文圣位之后, 在议事上顶住"全闭"派的压力.
    stance: |
      "通——但通过教化, 不是武力."
    inner_thought: |
      他这次第一次让自己的"不合时宜"成为主流方案.
  文海周密 (敌方影子, 仍在):
    actions: |
      虽未死, 但他对天地通的影响仍在——他登天的盘算被堵死,
      但他在暗处可能伺机利用任何"通"的漏洞.
    stance: |
      "通对我有利. 闭对我也有利. 看哪一边漏洞大."
    inner_thought: |
      他这种存在让所有"通"派都得保留戒心.
  陆沉 / 顾清崧:
    actions: |
      作为夜航船一线代表, 在议事外提供"通"的实际可行性参考.
    stance: |
      "我们撑了几千年的船, 通不通得了, 我们最清楚."
    inner_thought: |
      他们对议事不感兴趣, 但乐意参与"具体怎么撑"这一层.

related_events: [蛮荒大战, 五彩天下, 文庙议事, 夜航船]

fine_grain_hint: |
  各次议事的具体议题、礼圣的"通"规矩具体条款、陈平安亲自
  坐镇的几条跨界路、文海周密在"通"漏洞里的几次试探——
  本地装好原文后可调出.
