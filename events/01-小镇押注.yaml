event: 小镇押注
event_id: town_betting
type: event
chapters: ["0001", "0085"]
participants: [齐静春, 崔瀺, 老秀才, 阿良, 杨老头, 阮邛, 文圣, 礼圣, 道祖, 陈平安, 宁姚, 顾粲, 宋集薪, 马苦玄, 陈对, 阴阳家陆氏]

cause: |
  骊珠洞天即将破碎落地, 洞天里残留了一批气运未散的"读书种子""剑修苗子""龙门孩童".
  对外面那些大势力来说, 这是一次无主之物分食的窗口——一旦洞天破碎, 这些孩子的根脚、
  气运、本命物全都流出. 各大宗门、文脉、朝廷, 谁能押对一颗子, 就是百年甚至千年的回报.

process: |
  押注分明暗两层. 明的, 是各方修士陆续进入小镇打照面、安置棋子、定信物——
  正阳山的老猿到桃叶巷, 神诰宗、风雷园、风雪庙、白云观各自盯一两个孩子;
  观湖书院、稷下学宫、白也之徒安排门生过路提点; 大骊朝廷以督造官、龙窑等
  名义下钉子. 暗的, 是齐静春和崔瀺这一对师兄弟分别坐镇, 各押各的人:
  齐静春把核心几个孩子(陈平安、宁姚、宋集薪一线)按住, 不让外人乱动;
  崔瀺把宋集薪、马苦玄、陈对等"福禄街"那一脉的气运拨入大骊国运盘子.
  杨老头作为隐藏的青童天君, 把飞升台一关守住, 不让人借洞天破碎做手脚.
  阿良则是替他师弟过来"看戏", 顺手坏掉几个想下黑手的修士.
  最后大考开局, 各方押注由"埋种子"过渡到"开盘验账", 齐静春以身落子,
  把整个小镇的几条关键命运线压定下来, 留给陈平安一辈子用得着的几样东西.

result: |
  齐静春身死, 用一条命把这盘押注定住, 让该到陈平安、宁姚、刘羡阳、顾粲、
  宋集薪头上的那一份气运没被外人吞掉. 大骊从此把宋集薪一系收入囊中,
  小镇成为大骊版图的"南端子". 各大宗门或多或少都拿到了自己押的那一份,
  但最大的一份"读书种子"被齐静春按在了陈平安身上. 整个洞天破碎后的
  气运分配格局, 实际上由齐静春+崔瀺这一手共同决定.

roles:
  齐静春:
    actions: |
      亲自在学塾坐镇, 替几个核心孩子挡掉路过修士的手脚.
      给陈平安留下槐叶、簪子、四方印章作为后手.
      在大考棋局上以身落子, 用自己的命把规矩定死.
    stance: |
      "押注可以, 但孩子们不是货. 该归他们的, 谁也不能抢."
    inner_thought: |
      他知道自己赔上的是命. 但这盘押注若没有人坐在中央用命压住,
      日后陈平安他们的路就走不通——所以他不犹豫.
  崔瀺:
    actions: |
      安排督造官宋煜章一脉, 把宋集薪的气运盘子转入大骊国运.
      暗中接触杨老头, 谈飞升台的后手. 跟齐静春说清楚"你坐你的, 我下我的".
    stance: |
      "押注一事, 我不为自己, 是为大骊一国, 也是为日后挡蛮荒一刀."
    inner_thought: |
      他对师弟的赔法不赞成, 也不阻拦. 他清楚, 师弟若不死,
      局压不住; 师弟若死, 他得替师弟把后头的事做完.
  老秀才:
    actions: |
      不亲自下场, 但默许两个弟子各走各的, 暗中替他们挡了部分文庙压力.
    stance: |
      "押注我不参与. 但我护短——我两个弟子怎么走我都跟着."
    inner_thought: |
      他心痛齐静春必死的结局, 但他知道自己拦不住, 也不该拦.
  阿良:
    actions: |
      路过小镇, 顺手坏掉两三个准备对孩子们下黑手的中等修士.
      留下几句不正经的话给齐静春当念想.
    stance: |
      "我不押注. 我就是来看朋友最后一面顺便打几个搅局的人."
    inner_thought: |
      他不想看齐静春赴死, 但他也尊重齐静春的选择. 他能做的就是把
      场子收拾干净, 让师弟走得不那么难看.
  杨老头:
    actions: |
      守着飞升台不让人借机开天.
      给陈平安拳谱、四张真气符以打底子.
      接受崔瀺关于"陈平安的后手不要动"的请求.
    stance: |
      "押注是你们的事. 飞升台是我的事. 谁碰飞升台, 我就动手."
    inner_thought: |
      他对齐静春这种赔法心生敬意, 不点破, 也不出手协助——这是规矩.
  陈平安:
    actions: |
      作为最大的"押注对象"全程不知情. 自己只是挑水、烧瓷、
      给宁姚开门、抓药、跟同龄人打交道.
    stance: |
      他没立场——他不知道自己是这盘的核心子.
    inner_thought: |
      他唯一的念头是"活下去 + 不赖账". 这两条朴素到极点的念头,
      恰恰让齐静春决定把所有重的东西都押在他身上.

related_events: [本命瓷, 骊珠洞天坠落事件, 大考落幕]

fine_grain_hint: |
  各大宗门进小镇的具体名册、督造官宋煜章的廊桥操作、苻南华和蔡金简
  的那几次交手、阿良坏掉的具体几个修士——本地装好原文后可调出.
