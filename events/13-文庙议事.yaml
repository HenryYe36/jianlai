event: 文庙议事
event_id: wenmiao_council
type: event
chapters: ["0765", "1011"]
participants: [礼圣, 亚圣, 老秀才, 文海周密, 崔瀺, 道祖, 佛祖, 陆沉, 至圣先师 (隐), 各家文脉代表, 陈平安]

cause: |
  文庙是浩然天下儒家的中枢, 七十二书院皆从文庙体系下分.
  文庙议事在剑来里是"决定整片天下大方向"的最高级会议——
  通常涉及: 蛮荒应对、文圣资格、各洲气运分配、神祇册封、
  弟子升降. 多次召开, 但贯穿全书的几次议事尤为关键: 一次是
  老秀才被剥夺文圣身份关功德林, 一次是阴阳家陆氏推衍剑气长城
  必破后的应对议事, 一次是大战收尾后的封赏与文圣恢复.

process: |
  议事采取"圣人坐, 各家文脉派代表发声"的方式. 礼圣作为主持,
  亚圣作为内务长, 老秀才被罚那一段不在席, 等被恢复后才回来.
  道祖佛祖远观, 偶尔通过陆沉或别的渠道传话. 议事议题之一:
  老秀才那点"不合时宜"的学问到底要不要继续传下去——
  这一关险些被亚圣否决, 是礼圣顶住的. 议题之二: 剑气长城
  必破后, 桐叶洲难民如何安置——这一关是崔瀺以大骊国师身份
  与文庙打配合, 把宝瓶洲南端开放给难民, 文庙补气运.
  议题之三: 大战收尾后, 谁担文圣、亚圣、礼圣这几把椅子的
  调整, 以及陈平安、左右、崔东山这一代的"文脉年轻代"位置.

result: |
  老秀才恢复文圣位; 桐叶洲难民部分迁入宝瓶洲、北俱芦洲;
  陈平安在文脉中的位置被正式确立(亚圣关门弟子+老秀才
  关门弟子, 这种"双重关门弟子"是特别身份). 文庙在大战后
  保留浩然儒家文脉的整体性, 没让蛮荒攻势把文脉打散.
  这是浩然天下"软实力"层面的一次大整顿.

roles:
  礼圣:
    actions: |
      主持议事, 替老秀才顶住几次否决, 协调三教与各洲.
    stance: |
      "规矩的事我来. 偏心的事老秀才来."
    inner_thought: |
      他对老秀才一直留有最大限度的余地——这是文庙圈子
      公开的秘密, 他不解释也不否认.
  亚圣:
    actions: |
      内务长, 多次质疑老秀才的学问, 严守文脉规矩.
    stance: |
      "我严, 是为了不让规矩被偏心毁掉."
    inner_thought: |
      他其实也认老秀才那一脉的价值, 但他必须扮反方——
      不然规矩就立不起来.
  老秀才 (文圣):
    actions: |
      被罚关功德林时不在席; 恢复后重新坐文圣位; 在议事上
      为弟子们撑伞.
    stance: |
      "护短就是护短. 别讲什么大道理."
    inner_thought: |
      他在议事上从不卖弄学问, 只在该护弟子的时候站出来.
  崔瀺:
    actions: |
      作为大骊国师与文庙做"非正式联络人"——他不在文脉名单内,
      但他对议事的影响不小.
    stance: |
      "我不要文庙的位置, 我要文庙在我桌子另一头."
    inner_thought: |
      他这一段对师父最孝顺的时刻, 反而是不在场——
      他的存在会给文庙添麻烦.
  陆沉:
    actions: |
      代表青冥天下/道家偶尔出现, 传话, 调侃, 提供信息.
    stance: |
      "我代道祖来听. 听完我自己写诗."
    inner_thought: |
      他对儒家议事抱"看戏"心态, 但关键节点会拨一下方向.
  陈平安 (后期):
    actions: |
      作为"双重关门弟子"被列入议事讨论范围, 偶尔被传唤.
    stance: |
      "议事的事我不抢, 该我做的我做."
    inner_thought: |
      他不爱去文庙——文庙的规矩跟他在落魄山那种朴素方式
      不是一回事. 他去, 是替先生撑场.
  文海周密 (敌方影子):
    actions: |
      虽不在席, 但他过去是浩然贾生, 他的转变本身就是文庙
      多次议事的隐线.
    stance: |
      "我曾在你们里面, 现在我在你们对面."
    inner_thought: |
      他对文庙的恨与不甘是真的, 但也不是他全部的动机.

related_events: [蛮荒大战, 五彩天下, 剑气长城守卫战]

fine_grain_hint: |
  老秀才被罚的具体罪名、亚圣与老秀才的具体争辩、桐叶洲难民
  迁徙方案的具体分配、陈平安双重关门弟子身份确认的具体场合
  ——本地装好原文后可调出.
