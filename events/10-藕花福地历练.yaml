event: 藕花福地历练
event_id: ouhua_fudi
type: arc
chapters: ["0303", "0316"]
participants: [陈平安, 老观主, 陆沉, 老秀才, 裴钱, 曹晴朗, 朱敛, 卢白象, 隋右边, 魏羡]

cause: |
  藕花福地是观道观老道人坐镇的小型福地, 也是一座"光阴长河"的
  缩影——里面的时间流速可调, 老道人本人是浩然天下存活最久之一,
  甚至比许多三教祖师更老. 陈平安此前与老秀才打过交道, 老秀才
  以一场"赌局"把陈平安送入藕花福地, 让他在里面历练几年.
  福地里有南苑国、北晋国、松籁国等数国, 历代英雄豪杰在此
  循环演绎. 陆沉远观, 老观主主导, 老秀才暗中布局.

process: |
  陈平安进入福地后, 真实身份不张扬, 行走于几国之间, 完成几桩
  "侠义事". 与南苑国丁婴(藕花福地天下第一武人)对峙, 学走桩、
  破丁婴架; 与种秋等武人交流, 悟"顶峰大架"; 在最后一段里,
  老观主带他穿越福地的"光阴长河", 让他亲眼看尽几十个不同人
  的一生——好人坏人、有功之臣、阴险小人、寒门夫子、走投无路
  的少侠. 看完后陈平安对"善恶"的理解被全部打散重组.
  老观主试图在思想上击败陈平安, 让他放弃齐静春那套学问,
  最终他没赢, 只能把陈平安"丢出"福地. 陈平安按约定带走五个人:
  魏羡(南苑国开国皇帝)、隋右边、卢白象、朱敛, 以及一个枯瘦小女孩
  ——后来被起名为裴钱.

result: |
  陈平安武道境界突破至五境, 心境也从"小镇少年"过渡到"能扛
  几条命的人". 五人随他出福地后, 各成落魄山骨干: 朱敛、卢白象
  在山中常驻, 隋右边练剑, 魏羡入画卷养成. 裴钱成为他第一个
  正经徒弟, 后来又收了曹晴朗. 这一段是陈平安"识人广度"和
  "心境深度"的最大跃升, 直接决定了他能在剑气长城坐住隐官位.

roles:
  陈平安:
    actions: |
      入藕花福地, 拜师种秋, 与丁婴对峙, 穿越光阴长河, 走出福地.
    stance: |
      "我看完这些人的一辈子, 还是要做我自己."
    inner_thought: |
      他本来对小女孩(后来的裴钱)极为厌恶. 看完光阴长河之后,
      他没原谅她以前的恶, 但他决定"教她为人的道理", 这是他
      第一次主动选择"扛起一个不讨喜的人".
  老观主:
    actions: |
      主导整场福地历练, 试图让陈平安在思想上破裂、放弃齐静春那条路.
    stance: |
      "齐静春那条路走不通. 我让你看清楚."
    inner_thought: |
      他对陈平安最后的"还是选这条"态度心情阴沉, 但他守诺,
      把陈平安丢出福地, 没下杀手. 他也是讲规矩的人.
  老秀才:
    actions: |
      以一场赌局把陈平安送入福地, 暗中赢下老观主.
    stance: |
      "我赌我这门下学问能在这小子身上立住."
    inner_thought: |
      他赌赢了, 但赌的是陈平安的命. 这一份心理负担他自己扛着.
  陆沉:
    actions: |
      远观这场赌局, 不直接参与, 偶尔点拨一两句.
    stance: |
      "我看戏. 看完写个诗."
    inner_thought: |
      他对陈平安的兴趣是真的——这种少年很少见.
  裴钱 (枯瘦小女孩):
    actions: |
      在福地里游荡作恶, 被陈平安看不顺眼, 最后被丢进光阴长河
      一同看遍人世, 跟陈平安出福地.
    stance: |
      她那时候没什么"立场", 只是个想活下去的小孩.
    inner_thought: |
      她出福地那一刻还不懂"先生"两个字的分量, 也不知自己
      将来会成为陈平安最深的牵挂之一.
  卢白象 / 朱敛 / 隋右边 / 魏羡:
    actions: |
      作为福地里的"经典角色"被陈平安按约定带出, 入画卷养成.
    stance: |
      "我们这些人, 在福地里活了一辈子又活一辈子."
    inner_thought: |
      他们对陈平安的态度从"被人挑中"过渡到"愿意跟这少年走".
      这一转变发生在出福地后的第一个月里.

related_events: [北俱芦洲游历, 落魄山经营]

fine_grain_hint: |
  与丁婴的具体对峙、种秋的顶峰大架细节、光阴长河里看到的几个
  关键人物片段、给裴钱起名"裴钱"那一刻——本地装好原文后可调出.
