event: 大骊刺杀陈平安
event_id: dali_assassinate_chenpingan
type: event
chapters: ["0232", "0260"]
participants: [陈平安, 杜懋, 苻南华, 蔡金简, 大骊长春宫娘娘, 崔瀺, 阮邛, 阿良]

cause: |
  陈平安离开小镇南下后, 大骊朝廷内部并非铁板一块.
  大骊长春宫娘娘(后宫势力代表)对陈平安身上的几样齐静春遗物
  (尤其是"静"字印)极为忌惮——这几样东西若落在大骊外人手里,
  可能影响大骊国运与皇室秘事. 她绕过崔瀺, 联合老龙城外势力
  (苻南华、蔡金简等)与飞升境老怪杜懋, 决定在陈平安南下经过
  老龙城一带时设伏, 直接灭口拿物.

process: |
  陈平安在老龙城地界遭遇杜懋设下的杀局——杜懋以飞升境修为
  压迫一个境界相差悬殊的少年, 一击之下陈平安身负重伤,
  随身咫尺物玉牌都被毁. 在生死一线间, 陈平安死扛, 不退不逃,
  并以朱钱袋等手段反制. 此战之后, 陈平安险些丧命, 静字印被
  拿出来过. 杨老头(青童天君)远程出手, 在关键节点截下杜懋一半招式,
  让陈平安不至于死. 阮邛与阿良各自在不同节点出现, 让杜懋不敢
  一击毙命; 之后崔瀺得知此事, 介入清场——长春宫娘娘从此被
  圈禁在京城长春宫吃斋, 出不来; 苻南华和蔡金简等老龙城外势力
  也被一并整顿.

result: |
  陈平安活下来, 重伤后躲回小镇/铁匠铺养伤一段; 这一战让他
  对"飞升境武夫差距"和"自己有命有什么靠山"有了第一次刻骨认知.
  长春宫娘娘势力被清, 大骊朝廷内部整合成"以崔瀺为主导"的
  单一权力中枢. 陈平安从此再无来自大骊朝廷的直接威胁.
  这一事件也是崔瀺第一次在陈平安背后清场——这种"师兄式
  护短"是后来书简湖、剑气长城等地他持续做的事情之一.

roles:
  陈平安:
    actions: |
      与杜懋拼死一战, 死扛飞升境一击, 不退不跑.
      事后躲回小镇, 在铁匠铺养伤数月.
    stance: |
      "退一步, 我就再也不是泥瓶巷的陈平安."
    inner_thought: |
      他第一次直面"差距大到无法弥补"的境界压制. 他没逞强,
      但他也没认怂——他的反应是: 死也要死得直.
  杜懋 (主刺杀):
    actions: |
      以飞升境本命物吞剑舟出手, 一招毁了陈平安咫尺物玉牌.
    stance: |
      "拿东西回去, 顺手宰了."
    inner_thought: |
      他没把陈平安当回事——但被杨老头远程截下半招后, 他第一次
      感到"这少年身后水深得超出预期".
  长春宫娘娘 (主谋):
    actions: |
      绕过崔瀺联络老龙城和杜懋, 暗中下令.
    stance: |
      "齐静春的遗物不能流到外面."
    inner_thought: |
      她跟崔瀺向来不对付. 这次她以为可以借外力做掉陈平安、
      把齐静春的盘子收回——结果是她自己被圈禁.
  崔瀺:
    actions: |
      事后清场, 圈禁长春宫娘娘, 整顿老龙城外势力.
    stance: |
      "陈平安身上的东西, 我不动, 别人也不许动."
    inner_thought: |
      他没事先告诉陈平安自己有多关注, 这是故意的——
      他要陈平安自己挺过这一战, 才能在剑气长城坐住.
  杨老头:
    actions: |
      远程出手, 在杜懋一击半路截下一半招式.
    stance: |
      "陈平安那几样东西, 在我这里挂账."
    inner_thought: |
      他出手的程度刚刚好——既不让陈平安死, 也不让陈平安觉得
      "我有靠山". 分寸是他这种存在最讲究的东西.
  阮邛:
    actions: |
      陈平安回小镇养伤期间收容他, 帮他度过最危险的几个月.
    stance: |
      "答应过齐先生."
    inner_thought: |
      他对杜懋这种存在没有正面还手的余地, 但他守着小镇,
      就是给陈平安最后一道屏障.
  阿良:
    actions: |
      在陈平安最危险的几个时刻短暂出现, 让杜懋忌惮.
    stance: |
      "见死不救不是我的style."
    inner_thought: |
      他知道自己不能替陈平安打这一战, 但他可以给杜懋一个"再来一次试试"的眼神.

related_events: [求学远游, 书简湖问心]

fine_grain_hint: |
  杜懋本命物吞剑舟的具体形态、咫尺物玉牌被毁那一刻陈平安手上的
  反应、长春宫娘娘事后被圈禁的细节、崔瀺整顿老龙城的过程——
  本地装好原文后可调出.
