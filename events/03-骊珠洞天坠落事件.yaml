event: 骊珠洞天坠落事件
event_id: lizhu_dongtian_fall
type: event
chapters: ["0001", "0090"]
participants: [齐静春, 崔瀺, 老秀才, 阿良, 杨老头, 礼圣, 道祖, 大骊先帝, 阮邛, 陈平安, 宁姚, 顾粲, 宋集薪, 刘羡阳, 马苦玄]

cause: |
  骊珠洞天本是真龙衔珠所成, 千年以来作为浩然天下顶级洞天之一,
  内藏大量山水气运、本命瓷、读书种子. 此时此刻, 洞天的灵气
  即将耗尽, 不得不"破碎落地"——把整个洞天降为凡俗世界,
  把里面的气运、人物、山水神祇分配给周边几洲. 大骊王朝的
  战略目标: 把骊珠洞天破碎后形成的疆域纳入版图.

process: |
  骊珠洞天破碎前数年, 大骊先帝已经布局——派督造官、收税、办龙窑,
  把小镇当未来辖地经营. 齐静春被派下来当学塾先生坐镇, 实际上是
  替文庙在洞天破碎前后稳定秩序. 阮邛兵家圣人入驻铁匠铺, 守住几把
  关键剑器与几个孩子的根器. 杨老头隐居药铺, 实为青童天君守飞升台.
  各路修士涌入抢气运, 齐静春一边教书一边挡; 苻南华、蔡金简、
  老猿、姚老头等一系列冲突贯穿整段时间. 大考最终开局, 齐静春以
  自身殒落为代价, 把洞天破碎过程中可能的混乱压住, 让规矩落下时
  不至于伤到核心几个孩子. 洞天破碎那一刻, 山河版图重画——
  小镇所在的位置变成了大骊治下的龙泉郡, 几座未来名山(落魄山、
  仙草山、宝箓山等)从虚无中生出, 待人买下、坐镇.

result: |
  骊珠洞天彻底降为凡俗世界, 小镇变成龙泉郡, 大骊获得一片新疆土
  与配套山水气运. 齐静春身死, 留印章、槐叶、簪子给陈平安. 杨老头
  留世继续守关键节点. 主要少年(陈平安、宁姚、刘羡阳、宋集薪、
  顾粲、马苦玄等)各自走出小镇, 走向不同命运. 这一事件成为整本
  剑来的起点——后面所有人物的轨迹都从这里发散.

roles:
  齐静春:
    actions: |
      多年坐镇学塾教书; 大考时押上自己的命; 临终把后手都交代清楚.
    stance: |
      "破碎不可避免, 但破碎过程必须有人守住底线."
    inner_thought: |
      他从一开始就知道自己是来送命的. 这份知情让他比所有人都从容.
  崔瀺:
    actions: |
      暗中协调大骊先帝、督造官、宋集薪一线, 把破碎后的气运纳入大骊版图.
      跟师弟谈判保住核心几件本命瓷.
    stance: |
      "破碎要做成, 大骊得吃下这块地."
    inner_thought: |
      他对小镇本身没有感情, 但他对师弟有. 师弟死之后那一刻,
      他第一次让自己冷得连阮邛都骂.
  老秀才:
    actions: |
      远远看着, 不直接介入, 但保住自己两个弟子在文庙的最低限度地位.
    stance: |
      "我两个弟子的事, 文庙这边我兜."
    inner_thought: |
      他心里其实最痛——他的关门弟子要为这件事赔命.
  阿良:
    actions: |
      最后一刻路过, 替齐静春挡了一些麻烦, 留下"江湖没什么好的也就酒还行"那句字.
    stance: |
      "看朋友最后一面."
    inner_thought: |
      他比谁都不愿齐静春赴死, 但他不阻止——这是齐静春自己的选择.
  杨老头:
    actions: |
      守飞升台不让外人借机开天. 给陈平安手脚里嵌四张真气符打底子.
    stance: |
      "破碎是天意, 飞升台是规矩."
    inner_thought: |
      他对齐静春这种赔法不评判, 也不学.
  大骊先帝:
    actions: |
      组织朝廷、督造官、龙窑、铁骑南下接手小镇所在地.
    stance: |
      "这是大骊百年布局的兑现."
    inner_thought: |
      他个人想活着看一眼倒悬山——这一点崔瀺利用得很好.
  陈平安:
    actions: |
      继续做他的活, 直到大考之后, 接受一切已经改变.
    stance: |
      他不知大局, 不站队.
    inner_thought: |
      他只知道齐先生没了、宁姑娘走了、要离开家乡. 没什么道理可讲,
      事情就这么发生了, 他得自己往前走.

related_events: [小镇押注, 本命瓷, 求学远游, 大考落幕]

fine_grain_hint: |
  督造官宋煜章的廊桥、苻南华与蔡金简的具体冲突、大考落幕的具体过招、
  老猿出山追刘羡阳那一段——本地装好原文后可调出.
